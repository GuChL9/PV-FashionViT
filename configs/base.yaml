seed: 42
device: cpu
run_name: baseline

data:
  root: data
  canvas_size: 56
  train_mode: center
  val_mode: center
  batch_size: 64
  eval_batch_size: 256
  num_workers: 0
  val_fraction: 0.1
  small_shift: 8
  large_shift: 18
  grid_values: [-18, -12, -6, 0, 6, 12, 18]
  affine_degrees: 10
  affine_scale: [0.9, 1.1]
  random_erasing_prob: 0.0

model:
  name: mlp
  img_size: 56
  in_channels: 1
  num_classes: 10
  hidden_dim: 256
  patch_size: 7
  embed_dim: 64
  depth: 2
  num_heads: 4
  mlp_ratio: 2.0
  dropout: 0.1
  pooling: cls

train:
  epochs: 12
  optimizer: adamw
  lr: 0.0003
  weight_decay: 0.05
  scheduler: cosine
  label_smoothing: 0.1
  grad_clip: 1.0
  cpu_threads: 8
  early_stopping_patience: 3
  early_stopping_min_epochs: 5
  early_stopping_min_delta: 0.0005

evaluation:
  run_grid_after_training: false

output:
  save_dir: outputs
